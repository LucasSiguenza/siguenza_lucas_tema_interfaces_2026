<ion-header>
      <ion-toolbar>
        <ion-title>{{usuario?.nombre}} {{usuario?.apellido}}</ion-title>
        <ion-buttons slot="end">
          <ion-button (click)="cerrarModal()">Cerrar</ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>

    <ion-content class="ion-padding">
      <div class="detalles-container">
        <img [src]="usuario?.foto" alt="Foto de {{usuario?.nombre}}" class="detalle-foto">

        <ion-list lines="none">
          <ion-item>
            <ion-label>
              <h2>{{ usuario?.nombre }} {{ usuario?.apellido }}</h2>
            </ion-label>
          </ion-item>

          <ion-item>
            <ion-label>
              <strong>DNI:</strong> {{ usuario?.dni }}
            </ion-label>
          </ion-item>

          <ion-item>
            <ion-label>
              <strong>CUIL:</strong> {{ usuario?.cuil }}
            </ion-label>
          </ion-item>

          <ion-item>
            <ion-label>
              <strong>Perfíl:</strong> {{ usuario?.perfil | titlecase}}
            </ion-label>
          </ion-item>

          <ion-item>
            <ion-label>
              <strong>Fecha de creación:</strong>
              {{ usuario?.created_at | formatoFecha}}
            </ion-label>
          </ion-item>
        </ion-list>
      </div>
    </ion-content>
